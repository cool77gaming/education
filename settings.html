<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Settings · EducationOS</title>
  <meta name="description" content="Theme, planning assumptions, pricing and data backup for EducationOS."/>
  <meta name="theme-color" content="#0b0d12"/>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg"/>
  <script>try{if(localStorage.getItem("eos.theme")==='"light"'||localStorage.getItem("eos.theme")==="light")document.documentElement.classList.remove("dark")}catch(e){}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>window.tailwind = window.tailwind || {}; tailwind.config = { darkMode: "class", corePlugins: { preflight: false } };</script>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
</head>
<body data-page="settings">
  <a class="visually-hidden" href="#page-content">Skip to content</a>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar" aria-label="Main navigation"></aside>
    <div id="drawer-backdrop" class="drawer-backdrop" aria-hidden="true"></div>
    <div class="main-wrap">
      <header id="topbar" class="topbar"></header>
      <main id="page-content" class="page page-enter">
        <div class="page-header">
          <div class="eyebrow">Preferences</div>
          <h1>Settings</h1>
          <p class="subtitle">Everything is stored locally in this browser — no account, no server. Export a backup before switching devices.</p>
        </div>
        <div id="settings-content"></div>
      </main>
    </div>
  </div>
  <nav id="bottom-nav" class="bottom-nav"></nav>
  <div id="search-overlay" class="search-overlay" aria-hidden="true"></div>
  <div id="toast-root"></div>

  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
  <script src="js/search.js"></script>
  <script>
    (function () {
      window.EOS.pages = window.EOS.pages || {};
      window.EOS.pages.settings = {
        init() {
          const EOS = window.EOS;
          const mount = document.getElementById("settings-content");
          const s = EOS.getSettings();

          const money = [
            ["sophiaMonthly", "Sophia subscription ($/month)"],
            ["studycomMonthly", "Study.com subscription ($/month)"],
            ["wguTermCost", "WGU tuition ($/6-month term)"],
            ["wguResourceFeePerTerm", "WGU resource fee ($/term)"],
            ["booksAndSupplies", "Books & supplies ($ total)"],
            ["licensureAndTestingFees", "Licensure & testing fees ($ total)"],
            ["traditionalFourYearCost", "Traditional university comparison ($ 4-year total)"],
          ];

          mount.innerHTML = `
            <div class="grid-cards cols-2 reveal-stagger">
              <section class="card" aria-labelledby="ap-title">
                <h2 class="card-title" id="ap-title">${EOS.icons.sparkles}Appearance</h2>
                <div style="display:flex;gap:10px">
                  <button class="btn" id="theme-dark">🌙 Dark (default)</button>
                  <button class="btn" id="theme-light">☀️ Light</button>
                </div>
              </section>

              <section class="card" aria-labelledby="plan-title">
                <h2 class="card-title" id="plan-title">${EOS.icons.target}Planning assumptions</h2>
                <div style="display:grid;gap:14px">
                  <div>
                    <label class="field-label" for="set-pace">Target pace (CUs per WGU term) — drives the graduation estimate</label>
                    <input class="input" type="number" id="set-pace" min="12" max="60" value="${s.paceCUsPerTerm || 20}"/>
                  </div>
                  <div>
                    <label class="field-label" for="set-current">Current course (shown on dashboard)</label>
                    <input class="input" type="text" id="set-current" placeholder="e.g. Sophia — English Composition I"
                      value="${EOS.escape(EOS.store.get("currentCourse", ""))}"/>
                  </div>
                  <div>
                    <label class="field-label" for="set-gpa">GPA placeholder (WGU is pass/fail)</label>
                    <input class="input" type="text" id="set-gpa" value="${EOS.escape(EOS.store.get("gpa", "P/F"))}"/>
                  </div>
                </div>
              </section>

              <section class="card" aria-labelledby="price-title">
                <h2 class="card-title" id="price-title">${EOS.icons.dollar}Pricing estimates</h2>
                <p style="font-size:.8rem;color:var(--ink-3);margin-bottom:14px">Used by the calculator and savings stats. Verify current prices with each provider.</p>
                <div style="display:grid;gap:14px">
                  ${money.map(([key, label]) => `
                    <div>
                      <label class="field-label" for="set-${key}">${label}</label>
                      <input class="input" type="number" min="0" id="set-${key}" data-money-key="${key}" value="${s[key]}"/>
                    </div>`).join("")}
                </div>
              </section>

              <section class="card" aria-labelledby="data-title">
                <h2 class="card-title" id="data-title">${EOS.icons.resources}Your data</h2>
                <p style="font-size:.85rem;color:var(--ink-2);margin-bottom:16px">
                  Course completions, notes, checklist, calculator values and settings all live in this browser's local storage.
                </p>
                <div style="display:flex;gap:10px;flex-wrap:wrap">
                  <button class="btn" id="btn-export">${EOS.icons.download}Export backup</button>
                  <label class="btn" style="cursor:pointer">${EOS.icons.upload}Import backup
                    <input type="file" id="btn-import" accept="application/json" class="visually-hidden"/>
                  </label>
                  <button class="btn btn-danger" id="btn-reset">${EOS.icons.trash}Reset everything</button>
                </div>
              </section>
            </div>

            <section class="card reveal" style="margin-top:16px" aria-labelledby="about-title">
              <h2 class="card-title" id="about-title">${EOS.icons.info}About the data in this app</h2>
              <p style="font-size:.87rem;color:var(--ink-2)">
                ${EOS.escape(EOS.data.wgu.meta.dataNote)}
              </p>
              <p style="font-size:.87rem;color:var(--ink-2);margin-top:10px">
                To correct anything, edit the JSON files in the <code>data/</code> folder —
                <code>wgu.json</code> (degree plan), <code>sophia.json</code>, <code>studycom.json</code> — and re-publish. The README covers this step by step.
              </p>
            </section>`;

          /* Theme buttons */
          document.getElementById("theme-dark").addEventListener("click", () => { EOS.theme.apply("dark"); EOS.toast("Dark mode on"); });
          document.getElementById("theme-light").addEventListener("click", () => { EOS.theme.apply("light"); EOS.toast("Light mode on"); });

          /* Assumption fields */
          document.getElementById("set-pace").addEventListener("change", (e) => {
            EOS.saveSetting("paceCUsPerTerm", Math.max(12, +e.target.value || 20)); EOS.toast("Pace saved");
          });
          document.getElementById("set-current").addEventListener("change", (e) => {
            EOS.store.set("currentCourse", e.target.value.trim()); EOS.toast("Current course saved");
          });
          document.getElementById("set-gpa").addEventListener("change", (e) => {
            EOS.store.set("gpa", e.target.value.trim() || "P/F"); EOS.toast("Saved");
          });
          mount.querySelectorAll("[data-money-key]").forEach((input) => {
            input.addEventListener("change", () => {
              EOS.saveSetting(input.dataset.moneyKey, Math.max(0, +input.value || 0));
              EOS.toast("Pricing saved");
            });
          });

          /* Backup / restore / reset */
          document.getElementById("btn-export").addEventListener("click", () => {
            const blob = new Blob([EOS.store.exportAll()], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `educationos-backup-${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
            EOS.toast("Backup downloaded");
          });
          document.getElementById("btn-import").addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;
            file.text().then((txt) => {
              try { EOS.store.importAll(txt); EOS.toast("Backup restored — reloading"); setTimeout(() => location.reload(), 700); }
              catch (err) { alert("Import failed: " + err.message); }
            });
          });
          document.getElementById("btn-reset").addEventListener("click", () => {
            if (confirm("Reset ALL EducationOS data in this browser? This cannot be undone (export a backup first).")) {
              EOS.store.resetAll();
              location.reload();
            }
          });
        },
      };
    })();
  </script>
</body>
</html>
